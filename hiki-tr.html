<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10の補数トレーニング</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

  :root {
    --blue:        #1a6fc4;
    --blue-dark:   #1255a0;
    --red:         #e63030;
    --green:       #27ae60;
    --green-dark:  #1a8048;
    --gray:        #bfc8d6;
    --gray-light:  #f0f3f7;
    --bg:          #f5f7fa;
    --text:        #1a2233;
    --frame-border:#c8d4e4;
    --frame-bg:    #eef2f8;
    --white:       #ffffff;
    --shadow:      0 4px 24px rgba(26,111,196,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  #app {
    width: 800px;
    height: 560px;
    position: relative;
    transform-origin: top left;
    background: var(--white);
    border-radius: 28px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 32px 16px;
  }

  /* ── トップバー ── */
  #topbar {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 700;
    color: #6b7a99;
  }

  .control-group select {
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
    background: var(--gray-light);
    border: 2px solid var(--frame-border);
    border-radius: 10px;
    padding: 4px 10px;
    cursor: pointer;
    outline: none;
  }

  /* ── 式エリア ── */
  #formula-area {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 4px 0 12px;
    min-height: 72px;
  }

  .formula-part {
    font-size: 64px;
    font-weight: 900;
    color: var(--text);
    line-height: 1;
    transition: color 0.2s;
  }

  .formula-part.answer { color: var(--red); }
  .formula-part.blank  { color: var(--gray); }

  /* 入力中の数字（カーソル点滅） */
  .formula-part.inputting {
    color: var(--blue);
    border-bottom: 4px solid var(--blue);
    min-width: 48px;
    text-align: center;
  }

  /* ── テンフレームエリア ── */
  #tenframe-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
  }

  /* 補数モード: 1つのテンフレーム */
  #tenframe {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 10px;
    background: var(--frame-bg);
    border: 3px solid var(--frame-border);
    border-radius: 18px;
    padding: 14px;
  }

  .cell {
    width: 60px;
    height: 60px;
    border-radius: 14px;
    background: var(--frame-bg);
    border: 2.5px dashed var(--frame-border);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .dot {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    position: absolute;
  }

  .dot.blue  { background: var(--blue); box-shadow: 0 3px 8px rgba(26,111,196,0.30); }
  .dot.red   { background: var(--red);  box-shadow: 0 3px 8px rgba(230,48,48,0.30); }
  .dot.empty { display: none; }
  .dot.red-hint { background: rgba(230,48,48,0.28); box-shadow: none; }

  @keyframes dropIn {
    0%   { transform: translateY(-60px) scale(0.6); opacity: 0; }
    60%  { transform: translateY(6px) scale(1.08); opacity: 1; }
    100% { transform: translateY(0) scale(1); opacity: 1; }
  }
  .dot.animate-drop { animation: dropIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards; }

  @keyframes shrinkOut {
    0%   { transform: scale(1); opacity: 1; }
    100% { transform: scale(0); opacity: 0; }
  }
  .dot.animate-shrink { animation: shrinkOut 0.3s ease-in forwards; }

  /* ひき算・入力モード用テンフレーム群 */
  #sub-frames {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  .sub-frame {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(2, 1fr);
    background: var(--frame-bg);
    border: 3px solid var(--frame-border);
    border-radius: 18px;
  }

  /* ── エラー表示 ── */
  #error-msg {
    font-size: 22px;
    font-weight: 800;
    color: var(--red);
    text-align: center;
    padding: 12px;
    display: none;
  }

  /* ── ボタンエリア ── */
  #bottom-area {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
  }

  /* テンキー */
  #numpad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    width: 100%;
    max-width: 480px;
  }

  .numpad-btn {
    font-family: 'Nunito', sans-serif;
    font-size: 24px;
    font-weight: 900;
    height: 56px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    background: var(--gray-light);
    color: var(--text);
    border-bottom: 4px solid var(--frame-border);
    transition: transform 0.07s, border-bottom 0.07s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .numpad-btn:active {
    transform: translateY(3px);
    border-bottom: 1px solid var(--frame-border);
  }

  .numpad-btn.del        { background: #fde8e8; color: var(--red); border-bottom-color: #f5b8b8; }
  .numpad-btn.next-phase { background: #e8f4fd; color: var(--blue); border-bottom-color: #b8d8f5; font-size: 18px; }
  .numpad-btn.next-phase:disabled { opacity: 0.35; }
  .numpad-btn.calc       { background: var(--blue); color: white; border-bottom-color: var(--blue-dark); grid-column: span 4; font-size: 22px; }
  .numpad-btn.calc:active { border-bottom: 1px solid var(--blue-dark); }

  /* メインボタン（補数・ひき算モード） */
  #btn {
    width: 280px;
    height: 68px;
    font-family: 'Nunito', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: white;
    background: var(--blue);
    border: none;
    border-radius: 20px;
    cursor: pointer;
    box-shadow: 0 6px 0 var(--blue-dark), 0 8px 16px rgba(26,111,196,0.25);
    transition: transform 0.08s, box-shadow 0.08s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    display: block;
  }

  #btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 var(--blue-dark), 0 4px 8px rgba(26,111,196,0.20);
  }

  #btn.next {
    background: var(--green);
    box-shadow: 0 6px 0 var(--green-dark), 0 8px 16px rgba(39,174,96,0.25);
  }

  #btn.next:active {
    box-shadow: 0 2px 0 var(--green-dark), 0 4px 8px rgba(39,174,96,0.20);
  }

  /* もどるボタン（入力モードの計算後） */
  #back-btn {
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: #6b7a99;
    background: var(--gray-light);
    border: 2px solid var(--frame-border);
    border-radius: 14px;
    padding: 8px 24px;
    cursor: pointer;
    display: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* ひき算ステップのボタン（入力モードで計算後に使う） */
  #step-btn {
    width: 280px;
    height: 68px;
    font-family: 'Nunito', sans-serif;
    font-size: 28px;
    font-weight: 900;
    color: white;
    background: var(--blue);
    border: none;
    border-radius: 20px;
    cursor: pointer;
    box-shadow: 0 6px 0 var(--blue-dark), 0 8px 16px rgba(26,111,196,0.25);
    transition: transform 0.08s, box-shadow 0.08s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    display: none;
  }

  #step-btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 var(--blue-dark), 0 4px 8px rgba(26,111,196,0.20);
  }

  #step-btn.next {
    background: var(--green);
    box-shadow: 0 6px 0 var(--green-dark), 0 8px 16px rgba(39,174,96,0.25);
  }
</style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <div class="control-group">
      モード
      <select id="modeSelect">
        <option value="1">補数</option>
        <option value="2">ひき算</option>
        <option value="3">入力</option>
      </select>
    </div>
    <div class="control-group">
      振動
      <select id="vibrationSelect">
        <option value="0">OFF</option>
        <option value="1">弱</option>
        <option value="2" selected>中</option>
        <option value="3">強</option>
      </select>
    </div>
  </div>

  <div id="formula-area"></div>
  <div id="tenframe-area">
    <div id="error-msg"></div>
  </div>

  <div id="bottom-area">
    <!-- 補数・ひき算モード用ボタン -->
    <button id="btn">こたえは？</button>

    <!-- 入力モード: テンキー -->
    <div id="numpad" style="display:none">
      <button class="numpad-btn" data-n="7">7</button>
      <button class="numpad-btn" data-n="8">8</button>
      <button class="numpad-btn" data-n="9">9</button>
      <button class="numpad-btn next-phase" data-n="next">つぎへ</button>
      <button class="numpad-btn" data-n="4">4</button>
      <button class="numpad-btn" data-n="5">5</button>
      <button class="numpad-btn" data-n="6">6</button>
      <button class="numpad-btn del" data-n="del">⌫</button>
      <button class="numpad-btn" data-n="1">1</button>
      <button class="numpad-btn" data-n="2">2</button>
      <button class="numpad-btn" data-n="3">3</button>
      <button class="numpad-btn" data-n="0">0</button>
      <button class="numpad-btn calc" data-n="calc">けいさん</button>
    </div>

    <!-- 入力モード: 計算後のステップボタン -->
    <button id="step-btn"></button>
    <button id="back-btn">← もどる</button>
  </div>

</div>

<script>
// ══════════════════════════════════════
//  状態
// ══════════════════════════════════════
let mode = 1;          // 1=補数, 2=ひき算, 3=入力
let step = 0;          // 0=問題, 1=ヒント, 2=答え
let a = 0, b = 0;
let prevA = null;
let animating = false;
let vibrationLevel = 2;
let audioCtx = null;

// 入力モード専用
let inputPhase = 'a';  // 'a' | 'b' | 'result'
let inputA = '';
let inputB = '';

// ══════════════════════════════════════
//  DOM
// ══════════════════════════════════════
const modeSelect      = document.getElementById('modeSelect');
const vibrationSelect = document.getElementById('vibrationSelect');
const formulaArea     = document.getElementById('formula-area');
const tenframeArea    = document.getElementById('tenframe-area');
const errorMsg        = document.getElementById('error-msg');
const btn             = document.getElementById('btn');
const numpad          = document.getElementById('numpad');
const stepBtn         = document.getElementById('step-btn');
const backBtn         = document.getElementById('back-btn');

// ══════════════════════════════════════
//  Audio
// ══════════════════════════════════════
const SCALE_HZ = [261.6, 293.7, 329.6, 349.2, 392.0, 440.0, 493.9, 523.3, 587.3, 659.3];

function playSound(type, pitchIndex) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const ctx = audioCtx;

  if (type === 'tap') {
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(520, ctx.currentTime);
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.08);

  } else if (type === 'reveal') {
    [0, 0.07].forEach((t, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(i === 0 ? 660 : 880, ctx.currentTime + t);
      g.gain.setValueAtTime(0.15, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.12);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + 0.12);
    });

  } else if (type === 'pitch') {
    const idx = Math.max(0, Math.min(9, pitchIndex));
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(SCALE_HZ[idx], ctx.currentTime);
    gain.gain.setValueAtTime(0.13, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.18);

  } else if (type === 'error') {
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(180, ctx.currentTime);
    gain.gain.setValueAtTime(0.12, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.2);
  }
}

function vibrate() {
  if (!navigator.vibrate) return;
  if (vibrationLevel === 1) navigator.vibrate(30);
  else if (vibrationLevel === 2) navigator.vibrate(80);
  else if (vibrationLevel === 3) navigator.vibrate([150,50,150]);
}

function vibratePulse() {
  if (!navigator.vibrate || vibrationLevel === 0) return;
  if (vibrationLevel === 1) navigator.vibrate(15);
  else if (vibrationLevel === 2) navigator.vibrate(30);
  else if (vibrationLevel === 3) navigator.vibrate(50);
}

function scheduleModalFeedback(count, dotDelayFn, direction) {
  for (let i = 0; i < count; i++) {
    const delaySec = dotDelayFn(i);
    const pitchIdx = direction === 'up' ? i : (count - 1 - i);
    setTimeout(() => {
      playSound('pitch', pitchIdx);
      vibratePulse();
    }, delaySec * 1000);
  }
}

// ══════════════════════════════════════
//  問題生成（補数・ひき算のみ）
// ══════════════════════════════════════
function generate() {
  if (mode === 1) {
    do { a = Math.floor(Math.random() * 9) + 1; } while (a === prevA);
    prevA = a;
    b = 10 - a;
  } else if (mode === 2) {
    let tries = 0;
    do {
      a = Math.floor(Math.random() * 8) + 11;
      b = Math.floor(Math.random() * 8) + 2;
      tries++;
    } while ((a % 10) >= b && tries < 100);
  }
}

// ══════════════════════════════════════
//  テンフレーム共通ビルダー
// ══════════════════════════════════════

// aの値に応じたフレーム設定を返す
function getFrameConfig(total) {
  if (total <= 10) return { frames: 1, cellSize: 60, dotSize: 46, gap: 10, padding: 14, radius: 18 };
  if (total <= 20) return { frames: 2, cellSize: 44, dotSize: 34, gap: 8,  padding: 10, radius: 16 };
  if (total <= 30) return { frames: 3, cellSize: 36, dotSize: 27, gap: 6,  padding: 8,  radius: 14 };
  if (total <= 40) return { frames: 4, cellSize: 30, dotSize: 22, gap: 5,  padding: 7,  radius: 12 };
                   return { frames: 5, cellSize: 26, dotSize: 19, gap: 4,  padding: 6,  radius: 10 };
}

// フレームラッパーを生成して返す
// dots: [{colorClass, animClass, animDelay}] の配列（長さ = totalDots）
function buildFrames(totalDots, cfg, dots) {
  const wrapper = document.createElement('div');
  wrapper.id = 'sub-frames';

  for (let f = 0; f < cfg.frames; f++) {
    const frame = document.createElement('div');
    frame.className = 'sub-frame';
    frame.style.gap     = cfg.gap + 'px';
    frame.style.padding = cfg.padding + 'px';
    frame.style.borderRadius = cfg.radius + 'px';

    for (let i = 0; i < 10; i++) {
      const globalIdx = f * 10 + i;
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.style.width        = cfg.cellSize + 'px';
      cell.style.height       = cfg.cellSize + 'px';
      cell.style.borderRadius = Math.round(cfg.cellSize * 0.22) + 'px';

      const dot = document.createElement('div');
      if (globalIdx < totalDots && dots[globalIdx]) {
        const d = dots[globalIdx];
        dot.className = 'dot ' + d.colorClass + (d.animClass ? ' ' + d.animClass : '');
        dot.style.width  = cfg.dotSize + 'px';
        dot.style.height = cfg.dotSize + 'px';
        if (d.animDelay !== undefined) {
          dot.style.animationDelay = d.animDelay + 's';
        }
      } else {
        dot.className = 'dot empty';
      }
      cell.appendChild(dot);
      frame.appendChild(cell);
    }
    wrapper.appendChild(frame);
  }
  return wrapper;
}

// ══════════════════════════════════════
//  描画: 補数モード（FIX・変更なし）
// ══════════════════════════════════════
function buildCell(colorClass, animClass) {
  const cell = document.createElement('div');
  cell.className = 'cell';
  const dot = document.createElement('div');
  dot.className = 'dot ' + colorClass + (animClass ? ' ' + animClass : '');
  cell.appendChild(dot);
  return cell;
}

function renderComplement() {
  tenframeArea.innerHTML = '';
  const frame = document.createElement('div');
  frame.id = 'tenframe';

  for (let i = 0; i < 10; i++) {
    let colorClass, animClass = '';
    if (i < a) {
      colorClass = 'blue';
    } else {
      colorClass = step === 0 ? 'empty' : 'red';
      if (step === 1) animClass = 'animate-drop';
    }
    const cell = buildCell(colorClass, animClass);
    if (step === 1 && i >= a) {
      cell.querySelector('.dot').style.animationDelay = ((i - a) * 0.06) + 's';
    }
    frame.appendChild(cell);
  }
  tenframeArea.appendChild(frame);
}

// ══════════════════════════════════════
//  描画: ひき算モード（FIX・変更なし）
// ══════════════════════════════════════
function renderSubtraction() {
  tenframeArea.innerHTML = '';
  const ans = a - b;
  const cfg = getFrameConfig(a);
  const dots = [];

  for (let i = 0; i < a; i++) {
    const isTarget = i >= ans;
    let colorClass = 'blue', animClass = '', animDelay;
    if (step === 1 && isTarget) {
      colorClass = 'red-hint';
    } else if (step === 2 && isTarget) {
      animClass  = 'animate-shrink';
      animDelay  = (i - ans) * 0.04;
    }
    dots.push({ colorClass, animClass, animDelay });
  }

  tenframeArea.appendChild(buildFrames(a, cfg, dots));
}

// ══════════════════════════════════════
//  描画: 入力モード
// ══════════════════════════════════════
function renderInputFormula() {
  formulaArea.innerHTML = '';
  const make = (text, cls) => {
    const span = document.createElement('span');
    span.className = 'formula-part' + (cls ? ' ' + cls : '');
    span.textContent = text;
    return span;
  };

  if (inputPhase === 'a') {
    // aを入力中
    formulaArea.appendChild(make(inputA || '□', inputA ? 'inputting' : 'blank'));
    formulaArea.appendChild(make(' － '));
    formulaArea.appendChild(make('□', 'blank'));
    formulaArea.appendChild(make(' ＝ '));
    formulaArea.appendChild(make('□', 'blank'));
  } else if (inputPhase === 'b') {
    // bを入力中
    formulaArea.appendChild(make(inputA));
    formulaArea.appendChild(make(' － '));
    formulaArea.appendChild(make(inputB || '□', inputB ? 'inputting' : 'blank'));
    formulaArea.appendChild(make(' ＝ '));
    formulaArea.appendChild(make('□', 'blank'));
  } else {
    // result: ひき算モードと同様
    const av = parseInt(inputA), bv = parseInt(inputB);
    const ans = av - bv;
    formulaArea.appendChild(make(av));
    formulaArea.appendChild(make(' － '));
    formulaArea.appendChild(make(bv));
    formulaArea.appendChild(make(' ＝ '));
    if (step === 0) {
      formulaArea.appendChild(make('□', 'blank'));
    } else {
      formulaArea.appendChild(make(ans, 'answer'));
    }
  }
}

function renderInputFrames() {
  tenframeArea.innerHTML = '';
  errorMsg.style.display = 'none';

  if (inputPhase !== 'result') return; // 入力中はテンフレーム不要

  const av = parseInt(inputA);
  const bv = parseInt(inputB);

  // バリデーション
  if (av > 50) {
    showError('50より大きい数は表示できません');
    return;
  }
  if (bv > av) {
    showError('引く数が大きすぎます');
    return;
  }
  if (bv < 0 || av < 0) {
    showError('0以上の数を入力してください');
    return;
  }

  a = av; b = bv;
  const ans = a - b;
  const cfg = getFrameConfig(a);
  const dots = [];

  for (let i = 0; i < a; i++) {
    const isTarget = i >= ans;
    let colorClass = 'blue', animClass = '', animDelay;
    if (step === 1 && isTarget) {
      colorClass = 'red-hint';
    } else if (step === 2 && isTarget) {
      animClass = 'animate-shrink';
      animDelay = (i - ans) * 0.04;
    }
    dots.push({ colorClass, animClass, animDelay });
  }

  tenframeArea.appendChild(buildFrames(a, cfg, dots));
}

function showError(msg) {
  tenframeArea.innerHTML = '';
  const err = document.createElement('div');
  err.id = 'error-msg';
  err.style.cssText = 'font-size:22px;font-weight:800;color:#e63030;text-align:center;padding:20px;';
  err.textContent = msg;
  tenframeArea.appendChild(err);
  playSound('error');
}

// ══════════════════════════════════════
//  メインレンダー
// ══════════════════════════════════════
function render() {
  if (mode === 1) {
    // 補数モード
    renderFormulaComplement();
    renderComplement();
    numpad.style.display = 'none';
    btn.style.display    = 'block';
    stepBtn.style.display = 'none';
    backBtn.style.display = 'none';
    if (step === 0) {
      btn.textContent = 'こたえは？';
      btn.classList.remove('next');
    } else {
      btn.textContent = 'つぎへ →';
      btn.classList.add('next');
    }

  } else if (mode === 2) {
    // ひき算モード
    renderFormulaSubtraction();
    renderSubtraction();
    numpad.style.display  = 'none';
    btn.style.display     = 'block';
    stepBtn.style.display = 'none';
    backBtn.style.display = 'none';
    if (step === 0) {
      btn.textContent = b + ' 引くと？';
      btn.classList.remove('next');
    } else if (step === 1) {
      btn.textContent = 'こたえは？';
      btn.classList.remove('next');
    } else {
      btn.textContent = 'つぎへ →';
      btn.classList.add('next');
    }

  } else {
    // 入力モード
    renderInputFormula();
    if (inputPhase !== 'result') {
      // テンキー表示
      tenframeArea.innerHTML = '';
      numpad.style.display  = 'grid';
      btn.style.display     = 'none';
      stepBtn.style.display = 'none';
      backBtn.style.display = 'none';
      // つぎへボタン: aフェーズで1文字以上入力済みのとき有効
      const nextPhaseBtn = numpad.querySelector('.next-phase');
      const canNext = inputPhase === 'a' && inputA.length > 0;
      nextPhaseBtn.disabled = !canNext;
      nextPhaseBtn.style.opacity = canNext ? '1' : '0.35';
      // けいさんボタンの有効/無効
      const calcBtn = numpad.querySelector('.calc');
      const canCalc = inputPhase === 'b' && inputB.length > 0;
      calcBtn.disabled = !canCalc;
      calcBtn.style.opacity = canCalc ? '1' : '0.4';
    } else {
      // 計算後: テンフレーム + ステップボタン + もどるボタン
      renderInputFrames();
      numpad.style.display  = 'none';
      btn.style.display     = 'none';
      stepBtn.style.display = 'block';
      backBtn.style.display = 'block';
      if (step === 0) {
        stepBtn.textContent = b + ' 引くと？';
        stepBtn.classList.remove('next');
      } else if (step === 1) {
        stepBtn.textContent = 'こたえは？';
        stepBtn.classList.remove('next');
      } else {
        stepBtn.textContent = 'もう一度';
        stepBtn.classList.add('next');
      }
    }
  }
}

// 補数・ひき算の式描画（既存と同じ）
function renderFormulaComplement() {
  formulaArea.innerHTML = '';
  const make = (text, cls) => {
    const span = document.createElement('span');
    span.className = 'formula-part' + (cls ? ' ' + cls : '');
    span.textContent = text;
    return span;
  };
  formulaArea.appendChild(make(a));
  formulaArea.appendChild(make(' ＋ '));
  formulaArea.appendChild(step === 0 ? make('□', 'blank') : make(b, 'answer'));
  formulaArea.appendChild(make(' ＝ '));
  formulaArea.appendChild(make('10'));
}

function renderFormulaSubtraction() {
  formulaArea.innerHTML = '';
  const make = (text, cls) => {
    const span = document.createElement('span');
    span.className = 'formula-part' + (cls ? ' ' + cls : '');
    span.textContent = text;
    return span;
  };
  const ans = a - b;
  formulaArea.appendChild(make(a));
  formulaArea.appendChild(make(' － '));
  formulaArea.appendChild(make(b));
  formulaArea.appendChild(make(' ＝ '));
  formulaArea.appendChild(step === 0 ? make('□', 'blank') : make(ans, 'answer'));
}

// ══════════════════════════════════════
//  ひき算ステップ共通処理
// ══════════════════════════════════════
function doSubStep() {
  if (step === 0) {
    step = 1;
    render();
  } else if (step === 1) {
    step = 2;
    animating = true;
    render();
    scheduleModalFeedback(b, i => i * 0.04, 'down');
    const maxDelay = b * 0.04 + 0.30;
    setTimeout(() => {
      animating = false;
      playSound('reveal');
      vibrate();
    }, maxDelay * 1000);
  }
}

// ══════════════════════════════════════
//  ボタンイベント: 補数・ひき算
// ══════════════════════════════════════
btn.addEventListener('click', () => {
  if (animating) return;
  playSound('tap');

  if (mode === 1) {
    if (step === 0) {
      step = 1;
      animating = true;
      render();
      scheduleModalFeedback(b, i => i * 0.06, 'up');
      const maxDelay = b * 0.06 + 0.35;
      setTimeout(() => {
        animating = false;
        playSound('reveal');
        vibrate();
      }, maxDelay * 1000);
    } else {
      step = 0;
      generate();
      render();
    }
  } else if (mode === 2) {
    if (step === 2) {
      step = 0;
      generate();
      render();
    } else {
      doSubStep();
    }
  }
});

// ══════════════════════════════════════
//  ボタンイベント: 入力モード ステップ
// ══════════════════════════════════════
stepBtn.addEventListener('click', () => {
  if (animating) return;
  playSound('tap');
  if (step === 2) {
    // もう一度 → 入力に戻る
    resetInput();
  } else {
    doSubStep();
  }
});

// もどるボタン
backBtn.addEventListener('click', () => {
  playSound('tap');
  resetInput();
});

// ══════════════════════════════════════
//  テンキー処理
// ══════════════════════════════════════
numpad.addEventListener('click', e => {
  const btn_n = e.target.closest('.numpad-btn');
  if (!btn_n) return;
  const n = btn_n.dataset.n;

  playSound('tap');

  if (n === 'del') {
    if (inputPhase === 'a') {
      inputA = inputA.slice(0, -1);
    } else {
      // bの入力中。bが空になったらaに戻る
      if (inputB.length > 0) {
        inputB = inputB.slice(0, -1);
      } else {
        inputPhase = 'a';
      }
    }
    render();
    return;
  }

  if (n === 'next') {
    // aフェーズ→bフェーズへ明示的に移動
    if (inputPhase === 'a' && inputA.length > 0) {
      inputPhase = 'b';
      render();
    }
    return;
  }

  if (n === 'calc') {
    if (inputPhase === 'b' && inputB.length > 0) {
      inputPhase = 'result';
      step = 0;
      render();
    }
    return;
  }

  // 数字入力
  if (inputPhase === 'a') {
    const next = inputA + n;
    if (parseInt(next) > 99) return;
    inputA = next;
    render();
  } else if (inputPhase === 'b') {
    const next = inputB + n;
    if (parseInt(next) > 99) return;
    inputB = next;
    render();
  }
});

function resetInput() {
  inputPhase = 'a';
  inputA = '';
  inputB = '';
  step = 0;
  a = 0; b = 0;
  render();
}

// ══════════════════════════════════════
//  モード・振動セレクト
// ══════════════════════════════════════
modeSelect.addEventListener('change', e => {
  mode = parseInt(e.target.value);
  step = 0;
  prevA = null;
  if (mode === 3) {
    resetInput();
  } else {
    generate();
    render();
  }
});

vibrationSelect.addEventListener('change', e => {
  vibrationLevel = parseInt(e.target.value);
});

// ══════════════════════════════════════
//  リサイズ
// ══════════════════════════════════════
function resize() {
  const scale = Math.min(window.innerWidth / 800, window.innerHeight / 560);
  const app = document.getElementById('app');
  app.style.transform = `scale(${scale})`;
  const w = 800 * scale, h = 560 * scale;
  app.style.position = 'fixed';
  app.style.left = ((window.innerWidth  - w) / 2) + 'px';
  app.style.top  = ((window.innerHeight - h) / 2) + 'px';
}
window.addEventListener('resize', resize);

// ══════════════════════════════════════
//  初期化
// ══════════════════════════════════════

// 入力モード: aが1文字入力された時点でbフェーズに自動遷移するが
// バックスペースでaに戻れる。aが2桁確定はそのままbへ。
// → 実際にはnumpadのclickで inputPhase='b' に切り替え済み。

generate();
render();
resize();
</script>
</body>
</html>
