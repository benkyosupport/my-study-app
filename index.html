<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>九九学習支援ツール（完成版）</title>
    <style>
        :root {
            --dot-color: #3498db;
            --box-border-color: #bdc3c7;
            --text-color: #333;
            --accent-color: #e74c3c;
            --bg-color: #f0f2f5;
        }
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            min-height: 100vh; margin: 0; background-color: var(--bg-color);
            touch-action: manipulation; /* ダブルタップズーム防止 */
        }

        /* 段選択メニュー */
        .menu {
            margin: 20px 0;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            width: 95%;
        }
        .menu-btn {
            padding: 12px 18px;
            font-size: 18px;
            cursor: pointer;
            border: 2px solid var(--dot-color);
            background: white;
            color: var(--dot-color);
            border-radius: 12px;
            transition: 0.2s;
        }
        .menu-btn.active {
            background: var(--dot-color);
            color: white;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }

        #card { 
            background: white; padding: 30px; border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            text-align: center; width: 90%; max-width: 850px; min-height: 580px;
            display: flex; flex-direction: column; justify-content: space-around;
        }

        /* ドッツ表示領域 */
        #dots-area {
            display: flex; gap: 15px; margin: 0 auto 10px auto;
            justify-content: center; align-content: center;
            min-height: 240px; flex-wrap: wrap;
        }
        .dot-box {
            border: 2px solid var(--box-border-color);
            border-radius: 12px; padding: 8px;
            display: grid; gap: 8px; background-color: #fff;
        }
        .dot { width: 28px; height: 28px; background-color: var(--dot-color); border-radius: 50%; }

        /* 式と読み */
        .formula-row { display: flex; justify-content: center; align-items: center; gap: 30px; }
        .char-group { display: flex; flex-direction: column; align-items: center; min-width: 90px; }
        .char-main { font-size: 85px; font-weight: bold; color: var(--text-color); line-height: 1; margin-bottom: 10px; }
        .char-sub { font-size: 28px; color: #777; height: 35px; line-height: 1; }

        /* 答え */
        .answer-row { display: flex; justify-content: center; align-items: center; gap: 25px; min-height: 130px; }
        .answer-main { font-size: 115px; color: var(--accent-color); font-weight: bold; line-height: 1; }
        .answer-sub { font-size: 36px; color: var(--accent-color); }

        .hidden { visibility: hidden; }
        
        .controls { margin: 25px 0; }
        .main-btn { 
            padding: 20px 80px; font-size: 28px; cursor: pointer; border: none; 
            background: #2ecc71; color: white; border-radius: 50px;
            box-shadow: 0 6px 0 #27ae60; transition: 0.1s;
        }
        .main-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #27ae60; }
    </style>
</head>
<body>

<div class="menu" id="step-menu"></div>

<div id="card">
    <div id="dots-area"></div>
    
    <div class="formula-row">
        <div class="char-group">
            <div id="f1" class="char-main"></div>
            <div id="y1" class="char-sub hidden"></div>
        </div>
        <div class="char-main">×</div>
        <div class="char-group">
            <div id="f2" class="char-main"></div>
            <div id="y2" class="char-sub hidden"></div>
        </div>
        <div class="char-main">＝</div>
    </div>
    
    <div class="answer-row">
        <div id="ans-main" class="answer-main hidden"></div>
        <div id="ans-sub" class="answer-sub hidden"></div>
    </div>
</div>

<div class="controls">
    <button class="main-btn" onclick="nextStep()">次へ</button>
</div>

<script>
    const yomiMap = {
        1:"いち", 2:"に", 3:"さん", 4:"よん", 5:"ご", 6:"ろく", 7:"なな", 8:"はち", 9:"きゅう",
        10:"じゅう", 12:"じゅうに", 14:"じゅうよん", 15:"じゅうご", 16:"じゅうろく", 18:"じゅうはち",
        20:"にじゅう", 21:"にじゅういち", 24:"にじゅうよん", 25:"にじゅうご", 27:"にじゅうなな", 28:"にじゅうはち",
        30:"さんじゅう", 32:"さんじゅうに", 35:"さんじゅうご", 36:"さんじゅうろく", 40:"よんじゅう", 42:"よんじゅうに",
        45:"よんじゅうご", 48:"よんじゅうはち", 49:"よんじゅうきゅう", 50:"ごじゅう", 54:"ごじゅうよん", 56:"ごじゅうなな",
        60:"ろくじゅう", 63:"ろくじゅうさん", 64:"ろくじゅうよん", 70:"ななじゅう", 72:"ななじゅうに", 80:"はちじゅう", 81:"はちじゅういち"
    };

    let currentDan = 2;
    let currentKakeru = 1;
    let step = 0;

    // メニュー生成
    const menu = document.getElementById('step-menu');
    for(let i=1; i<=9; i++) {
        const btn = document.createElement('button');
        btn.innerText = `${i}の段`;
        btn.className = i === 2 ? 'menu-btn active' : 'menu-btn';
        btn.onclick = () => selectDan(i);
        menu.appendChild(btn);
    }

    function selectDan(dan) {
        currentDan = dan;
        currentKakeru = 1;
        step = 0;
        Array.from(menu.children).forEach((btn, idx) => {
            btn.className = (idx + 1 === dan) ? 'menu-btn active' : 'menu-btn';
        });
        playTapSound();
        updateDisplay();
    }

    function createDots(n1, n2) {
        const area = document.getElementById('dots-area');
        area.innerHTML = '';
        for (let b = 0; b < n2; b++) {
            const box = document.createElement('div');
            box.className = 'dot-box';
            box.style.gridTemplateColumns = '1fr'; 
            for (let d = 0; d < n1; d++) {
                const dot = document.createElement('div');
                dot.className = 'dot';
                box.appendChild(dot);
            }
            area.appendChild(box);
        }
    }

    function playTapSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } catch(e) {}
    }

    function triggerVibration() {
        if (navigator.vibrate) navigator.vibrate(15);
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = 'ja-JP';
        uttr.rate = 1.1;
        window.speechSynthesis.speak(uttr);
    }

    function updateDisplay() {
        const n1 = currentDan;
        const n2 = currentKakeru;
        const ans = n1 * n2;

        document.getElementById('f1').innerText = n1;
        document.getElementById('y1').innerText = yomiMap[n1];
        document.getElementById('f2').innerText = n2;
        document.getElementById('y2').innerText = yomiMap[n2];
        document.getElementById('ans-main').innerText = ans;
        document.getElementById('ans-sub').innerText = yomiMap[ans];

        if (step === 0) createDots(n1, n2);

        document.getElementById('f1').className = (step >= 1) ? "char-main" : "char-main hidden";
        document.getElementById('f2').className = (step >= 1) ? "char-main" : "char-main hidden";
        document.getElementById('y1').className = (step >= 2) ? "char-sub" : "char-sub hidden";
        document.getElementById('y2').className = (step >= 2) ? "char-sub" : "char-sub hidden";
        document.getElementById('ans-main').className = (step >= 3) ? "answer-main" : "answer-main hidden";
        document.getElementById('ans-sub').className = (step >= 4) ? "answer-sub" : "answer-sub hidden";

        if (step === 2) speak(`${yomiMap[n1]}、${yomiMap[n2]}`);
        if (step === 4) speak(yomiMap[ans]);
    }

    function nextStep() {
        playTapSound();
        triggerVibration();
        step++;
        if (step > 4) {
            step = 0;
            currentKakeru++;
            if (currentKakeru > 9) currentKakeru = 1;
        }
        updateDisplay();
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            nextStep();
        }
    });

    updateDisplay();
</script>
</body>
</html>
