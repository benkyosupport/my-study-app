<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>九九学習ツール（完全版）</title>
    <style>
        :root {
            --dot-color: #3498db;
            --box-border-color: #bdc3c7;
            --text-color: #333;
            --accent-color: #e74c3c;
            --bg-color: #f0f2f5;
        }
        body { 
            font-family: "Helvetica Neue", Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start; 
            min-height: 100vh; margin: 0; background-color: var(--bg-color);
            touch-action: manipulation;
        }

        /* 段選択メニュー */
        .menu-container { margin: 15px 0; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 95%; }
        .dan-btn {
            padding: 10px 15px; font-size: 16px; cursor: pointer; border: 2px solid var(--dot-color);
            background: white; color: var(--dot-color); border-radius: 10px;
        }
        .dan-btn.active { background: var(--dot-color); color: white; }

        /* モード選択 */
        .mode-container { margin-bottom: 15px; display: flex; gap: 10px; }
        .mode-btn {
            padding: 8px 18px; font-size: 15px; cursor: pointer; border: 2px solid #95a5a6;
            background: white; color: #95a5a6; border-radius: 20px;
        }
        .mode-btn.active { background: #95a5a6; color: white; }

        #card { 
            background: white; padding: 25px; border-radius: 30px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            text-align: center; width: 90%; max-width: 800px; min-height: 520px;
            display: flex; flex-direction: column; justify-content: space-around;
        }

        /* ドッツ表示 */
        #dots-area { display: flex; gap: 12px; margin: 0 auto; justify-content: center; align-content: center; min-height: 200px; flex-wrap: wrap; }
        .dot-box { border: 2px solid var(--box-border-color); border-radius: 10px; padding: 6px; display: grid; gap: 6px; background-color: #fff; }
        .dot { width: 24px; height: 24px; background-color: var(--dot-color); border-radius: 50%; }

        /* 式と読み */
        .formula-row { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .char-group { display: flex; flex-direction: column; align-items: center; min-width: 80px; }
        .char-main { font-size: 75px; font-weight: bold; color: var(--text-color); line-height: 1; margin-bottom: 5px; }
        .char-sub { font-size: 24px; color: #777; height: 30px; }

        /* 答え */
        .answer-row { display: flex; justify-content: center; align-items: center; gap: 20px; min-height: 110px; }
        .answer-main { font-size: 100px; color: var(--accent-color); font-weight: bold; line-height: 1; }
        .answer-sub { font-size: 32px; color: var(--accent-color); }

        .hidden { visibility: hidden; }
        .controls { margin: 20px 0; }
        .next-btn { 
            padding: 18px 80px; font-size: 26px; cursor: pointer; border: none; 
            background: #2ecc71; color: white; border-radius: 50px;
            box-shadow: 0 5px 0 #27ae60;
        }
        .next-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #27ae60; }
    </style>
</head>
<body>

<div class="menu-container" id="dan-menu"></div>

<div class="mode-container" id="mode-menu">
    <button id="btn-asc" class="mode-btn active" onclick="setMode('asc')">じゅん</button>
    <button id="btn-desc" class="mode-btn" onclick="setMode('desc')">ぎゃく</button>
    <button id="btn-rand" class="mode-btn" onclick="setMode('rand')">ランダム</button>
</div>

<div id="card">
    <div id="dots-area"></div>
    <div class="formula-row">
        <div class="char-group"><div id="f1" class="char-main"></div><div id="y1" class="char-sub hidden"></div></div>
        <div class="char-main">×</div>
        <div class="char-group"><div id="f2" class="char-main"></div><div id="y2" class="char-sub hidden"></div></div>
        <div class="char-main">＝</div>
    </div>
    <div class="answer-row">
        <div id="ans-main" class="answer-main hidden"></div>
        <div id="ans-sub" class="answer-sub hidden"></div>
    </div>
</div>

<div class="controls">
    <button class="next-btn" onclick="handleNext()">次へ</button>
</div>

<script>
    const yomiMap = {
        1:"いち", 2:"に", 3:"さん", 4:"よん", 5:"ご", 6:"ろく", 7:"なな", 8:"はち", 9:"きゅう",
        10:"じゅう", 12:"じゅうに", 14:"じゅうよん", 15:"じゅうご", 16:"じゅうろく", 18:"じゅうはち",
        20:"にじゅう", 21:"にじゅういち", 24:"にじゅうよん", 25:"にじゅうご", 27:"にじゅうなな", 28:"にじゅうはち",
        30:"さんじゅう", 32:"さんじゅうに", 35:"さんじゅうご", 36:"さんじゅうろく", 40:"よんじゅう", 42:"よんじゅうに",
        45:"よんじゅうご", 48:"よんじゅうはち", 49:"よんじゅうきゅう", 50:"ごじゅう", 54:"ごじゅうよん", 56:"ごじゅうろく",
        63:"ろくじゅうさん", 64:"ろくじゅうよん", 72:"ななじゅうに", 81:"はちじゅういち"
    };

    let currentDan = 2;
    let currentMode = 'asc';
    let queue = [1,2,3,4,5,6,7,8,9];
    let qIdx = 0;
    let step = 0;
    let audioCtx = null;

    // 初期化：段ボタン作成
    const danMenu = document.getElementById('dan-menu');
    for (let i = 1; i <= 9; i++) {
        const b = document.createElement('button');
        b.innerText = i + 'の段';
        b.className = (i === currentDan) ? 'dan-btn active' : 'dan-btn';
        b.onclick = () => selectDan(i);
        danMenu.appendChild(b);
    }

    function selectDan(n) {
        currentDan = n;
        Array.from(danMenu.children).forEach((btn, idx) => {
            btn.className = (idx + 1 === n) ? 'dan-btn active' : 'dan-btn';
        });
        resetGame();
    }

    function setMode(m) {
        currentMode = m;
        document.getElementById('btn-asc').className = (m === 'asc') ? 'mode-btn active' : 'mode-btn';
        document.getElementById('btn-desc').className = (m === 'desc') ? 'mode-btn active' : 'mode-btn';
        document.getElementById('btn-rand').className = (m === 'rand') ? 'mode-btn active' : 'mode-btn';
        resetGame();
    }

    function resetGame() {
        step = 0;
        qIdx = 0;
        if (currentMode === 'asc') queue = [1,2,3,4,5,6,7,8,9];
        else if (currentMode === 'desc') queue = [9,8,7,6,5,4,3,2,1];
        else queue = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
        playTap();
        updateUI();
    }

    function createDots(n1, n2) {
        const area = document.getElementById('dots-area');
        area.innerHTML = '';
        for (let i = 0; i < n2; i++) {
            const box = document.createElement('div');
            box.className = 'dot-box';
            box.style.gridTemplateColumns = '1fr'; 
            for (let j = 0; j < n1; j++) {
                const d = document.createElement('div');
                d.className = 'dot';
                box.appendChild(d);
            }
            area.appendChild(box);
        }
    }

    function playTap() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        if (navigator.vibrate) navigator.vibrate(15);
    }

    function speak(text) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'ja-JP'; u.rate = 1.1;
        window.speechSynthesis.speak(u);
    }

    function updateUI() {
        const n1 = currentDan;
        const n2 = queue[qIdx];
        const ans = n1 * n2;

        document.getElementById('f1').innerText = n1;
        document.getElementById('y1').innerText = yomiMap[n1] || n1;
        document.getElementById('f2').innerText = n2;
        document.getElementById('y2').innerText = yomiMap[n2] || n2;
        document.getElementById('ans-main').innerText = ans;
        document.getElementById('ans-sub').innerText = yomiMap[ans] || ans;

        if (step === 0) createDots(n1, n2);

        document.getElementById('f1').className = (step >= 1) ? "char-main" : "char-main hidden";
        document.getElementById('f2').className = (step >= 1) ? "char-main" : "char-main hidden";
        document.getElementById('y1').className = (step >= 2) ? "char-sub" : "char-sub hidden";
        document.getElementById('y2').className = (step >= 2) ? "char-sub" : "char-sub hidden";
        document.getElementById('ans-main').className = (step >= 3) ? "answer-main" : "answer-main hidden";
        document.getElementById('ans-sub').className = (step >= 4) ? "answer-sub" : "answer-sub hidden";

        if (step === 2) speak(`${yomiMap[n1] || n1}、${yomiMap[n2] || n2}`);
        if (step === 4) speak(yomiMap[ans] || ans);
    }

    function handleNext() {
        playTap();
        step++;
        if (step > 4) {
            step = 0;
            qIdx++;
            if (qIdx >= 9) {
                qIdx = 0;
                if (currentMode === 'rand') queue.sort(() => Math.random() - 0.5);
            }
        }
        updateUI();
    }

    // スペースキー/エンターキー対応
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleNext(); }
    });

    updateUI();
</script>
</body>
</html>
